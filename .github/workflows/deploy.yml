name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GH_PAGES: 'true'
          VITE_GOOGLE_CLIENT_ID: 837905096830-sju3b42cm7bglnd9mv378u8aiu5r15dc.apps.googleusercontent.com
          VITE_FIREBASE_API_KEY: AIzaSyBPtUPydm0v_23c9LOUf7f4CZB5zB0AT_c
          VITE_FIREBASE_AUTH_DOMAIN: pisakasan-f2125.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: pisakasan-f2125
          VITE_FIREBASE_STORAGE_BUCKET: pisakasan-f2125.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 264454296654
          VITE_FIREBASE_APP_ID: 1:264454296654:web:f25d7e3233292c312f1f1f
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
